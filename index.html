<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mobile VR Test</title>
    <style>
        html, body { width:100%; height:100%; margin:0; overflow:hidden; }
        #renderCanvas { width:100%; height:100%; touch-action: none; }
    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/cannon.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = async () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.5, 0.8, 1); // sky blue

    // Light
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // Ground
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width:20, height:50}, scene);

    // Box to observe VR rotation
    const box = BABYLON.MeshBuilder.CreateBox("box", {size:1}, scene);
    box.position = new BABYLON.Vector3(0,1,-5);
    const mat = new BABYLON.StandardMaterial("mat", scene);
    mat.diffuseColor = new BABYLON.Color3(1,0,0);
    box.material = mat;

    // Enable VR
    const xr = await scene.createDefaultXRExperienceAsync({
        uiOptions: { sessionMode: 'immersive-vr' },
        optionalFeatures: true
    });

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => scene.render());
});

window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
