<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Cricket Mobile</title>
    <style>
        html, body { width:100%; height:100%; margin:0; overflow:hidden; }
        #renderCanvas { width:100%; height:100%; touch-action: none; }
        #score { position:absolute; top:10px; left:10px; color:white; font-size:24px; font-family:sans-serif; }
    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="score">Score: 0</div>

<!-- Babylon.js CDN -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://cdn.babylonjs.com/cannon.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

// Score
let score = 0;
const scoreDiv = document.getElementById("score");

const createScene = async () => {
    const scene = new BABYLON.Scene(engine);
    scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.CannonJSPlugin());

    // Light
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

    // Ground / Pitch
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 20, height: 50}, scene);
    ground.physicsImpostor = new BABYLON.PhysicsImpostor(
        ground,
        BABYLON.PhysicsImpostor.BoxImpostor,
        {mass:0, restitution:0.7},
        scene
    );

    // Ball
    const ball = BABYLON.MeshBuilder.CreateSphere("ball", {diameter: 0.3}, scene);
    ball.position = new BABYLON.Vector3(0, 1, 20);
    ball.material = new BABYLON.StandardMaterial("ballMat", scene);
    ball.material.diffuseColor = new BABYLON.Color3(1,0,0);
    ball.physicsImpostor = new BABYLON.PhysicsImpostor(
        ball,
        BABYLON.PhysicsImpostor.SphereImpostor,
        {mass:1, restitution:0.8},
        scene
    );

    // Bat
    const bat = BABYLON.MeshBuilder.CreateBox("bat", {width: 0.2, height: 1, depth: 0.05}, scene);
    bat.material = new BABYLON.StandardMaterial("batMat", scene);
    bat.material.diffuseColor = new BABYLON.Color3(0,0,1);

    // WebXR immersive VR
    const xr = await scene.createDefaultXRExperienceAsync({
        uiOptions: { sessionMode: 'immersive-vr' },
        optionalFeatures: true
    });

    // Attach bat to VR camera
    bat.parent = xr.baseExperience.camera;
    bat.position = new BABYLON.Vector3(0, -0.5, -1); // in front of camera

    // Ball pitching
    const pitchSpeed = 5;
    let ballResetTimeout;

    const resetBall = () => {
        ball.position = new BABYLON.Vector3(0, 1, 20);
        ball.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(0,0,0));
        ball.physicsImpostor.setAngularVelocity(new BABYLON.Vector3(0,0,0));
    };

    // Collision detection for scoring
    ball.physicsImpostor.registerOnPhysicsCollide(bat.physicsImpostor, function(){
        score += 1;
        scoreDiv.innerText = "Score: " + score;
        clearTimeout(ballResetTimeout);
        ballResetTimeout = setTimeout(resetBall, 1000); // reset ball after 1 sec
    });

    // Move ball toward player
    scene.onBeforeRenderObservable.add(() => {
        const dt = scene.getEngine().getDeltaTime() / 1000;
        const dir = new BABYLON.Vector3(0,0,-1);
        ball.physicsImpostor.applyImpulse(dir.scale(pitchSpeed*dt), ball.getAbsolutePosition());
    });

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => scene.render());
});

window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
