<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VR Cricket</title>
    <style>
        html, body { width:100%; height:100%; margin:0; overflow:hidden; }
        #renderCanvas { width:100%; height:100%; touch-action: none; }
        #score { position:absolute; top:10px; left:10px; color:white; font-size:24px; font-family:sans-serif; }
    </style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<div id="score">Score: 0</div>

<!-- Babylon.js CDN -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
<script src="https://cdn.babylonjs.com/cannon.js"></script>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

// Score
let score = 0;
const scoreDiv = document.getElementById("score");

const createScene = async () => {
    const scene = new BABYLON.Scene(engine);
    scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), new BABYLON.CannonJSPlugin());

    // Camera
    const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 2, -10), scene);
    camera.attachControl(canvas, true);

    // Light
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

    // Ground / Pitch
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 20, height: 50}, scene);
    ground.physicsImpostor = new BABYLON.PhysicsImpostor(ground, BABYLON.PhysicsImpostor.BoxImpostor, {mass:0, restitution:0.7}, scene);

    // Ball
    const ball = BABYLON.MeshBuilder.CreateSphere("ball", {diameter: 0.3}, scene);
    ball.position = new BABYLON.Vector3(0, 1, 20);
    ball.material = new BABYLON.StandardMaterial("ballMat", scene);
    ball.material.diffuseColor = new BABYLON.Color3(1,0,0);
    ball.physicsImpostor = new BABYLON.PhysicsImpostor(ball, BABYLON.PhysicsImpostor.SphereImpostor, {mass:1, restitution:0.8}, scene);

    // Bat (simple box for now)
    const bat = BABYLON.MeshBuilder.CreateBox("bat", {width: 0.2, height: 1, depth: 0.05}, scene);
    bat.position = new BABYLON.Vector3(0, 1, -5);
    bat.material = new BABYLON.StandardMaterial("batMat", scene);
    bat.material.diffuseColor = new BABYLON.Color3(0,0,1);
    bat.physicsImpostor = new BABYLON.PhysicsImpostor(bat, BABYLON.PhysicsImpostor.BoxImpostor, {mass:0}, scene);

    // WebXR
    const xr = await scene.createDefaultXRExperienceAsync({
        uiOptions: { sessionMode: 'immersive-vr' },
        optionalFeatures: true
    });

    // Ball pitching
    const pitchSpeed = 5;
    let ballResetTimeout;

    const resetBall = () => {
        ball.position = new BABYLON.Vector3(0, 1, 20);
        ball.physicsImpostor.setLinearVelocity(new BABYLON.Vector3(0,0,0));
        ball.physicsImpostor.setAngularVelocity(new BABYLON.Vector3(0,0,0));
    };

    // Swing detection (simple: tap or space key)
    window.addEventListener("keydown", e => {
        if(e.code === "Space") swingBat();
    });
    canvas.addEventListener("pointerdown", swingBat);

    function swingBat() {
        const impulseDir = new BABYLON.Vector3(0,0,10);
        bat.physicsImpostor.applyImpulse(impulseDir, bat.getAbsolutePosition());
    }

    // Collision detection for scoring
    ball.physicsImpostor.registerOnPhysicsCollide(bat.physicsImpostor, function(main, collided){
        score += 1;
        scoreDiv.innerText = "Score: " + score;
        clearTimeout(ballResetTimeout);
        ballResetTimeout = setTimeout(resetBall, 1000); // reset after 1 sec
    });

    scene.onBeforeRenderObservable.add(() => {
        // Move ball toward player
        const dir = new BABYLON.Vector3(0,0,-1);
        ball.physicsImpostor.applyImpulse(dir.scale(pitchSpeed*scene.getEngine().getDeltaTime()/1000), ball.getAbsolutePosition());
    });

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => scene.render());
});

window.addEventListener("resize", () => {
    engine.resize();
});
</script>
</body>
</html>
